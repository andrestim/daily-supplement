name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  # 允許在 Actions 頁面手動觸發
  workflow_dispatch:

# 給 GITHUB_TOKEN 部署 Pages 所需的權限
permissions:
  contents: read
  pages: write
  id-token: write

# 同時間只跑一個部署，新的 push 會取消還在進行中的舊部署
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        # 自動把 base 設成 /<repo-name>/，專案站不用手動改 vite.config.ts。
        # 若你部署的是使用者/組織站（<user>.github.io），請把這行改成 VITE_BASE: /
        env:
          VITE_BASE: /${{ github.event.repository.name }}/
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
